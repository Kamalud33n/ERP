<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedNova — Register</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🏥 MedNova</h1>
      <p>Healthcare Management System</p>
    </div>
    <h2>Create an account</h2>

    <div class="alert alert-error"   id="error"></div>
    <div class="alert alert-success" id="success"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="johndoe"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@company.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="employee">Employee</option>
        <option value="hr_manager">HR Manager</option>
        <option value="finance">Finance</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="register()">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="/">Sign In</a>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
  async function register() {
    const username = document.getElementById("username").value.trim();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const role     = document.getElementById("role").value;
    const errEl    = document.getElementById("error");
    const sucEl    = document.getElementById("success");
    errEl.style.display = "none";
    sucEl.style.display = "none";

    if (!username || !email || !password) {
      errEl.textContent = "Please fill in all fields";
      errEl.style.display = "block";
      return;
    }

    try {
      await api("POST", "/auth/register", { username, email, password, role });
      sucEl.textContent = "Account created! Redirecting to login...";
      sucEl.style.display = "block";
      setTimeout(() => window.location.href = "/", 1500);
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = "block";
    }
  }
</script>
</body>
</html>
